<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mitko X Labs | Enterprise and Industrial Technology Solutions</title>
    <meta name="description" content="Mitko X Labs provides enterprise and industrial solutions, emerging technology solutions engineering, AI integration, IoT solutions, and technology consulting.">
    <meta name="keywords" content="Enterprise Solutions, Industrial Solutions, Technology Consulting, AI Solutions, Edge AI, Offline AI, Custom AI Models, IoT, Emerging Technology, AI Agents Development, Industrial IoT">
    <meta name="author" content="Mitko X Labs">
    <link rel="canonical" href="https://mitkox.com/">
    <style>
        @font-face {
            font-family: 'Ubuntu Mono';
            src: url('https://cdnjs.cloudflare.com/ajax/libs/UbuntuMono/1.0.3/ubuntumono-bold-webfont.woff2') format('woff2');
            font-weight: 500;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: subpixel-antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --terminal-bg: #000000;
            --terminal-text: #00ff00;
            --text-glow: 0 0 2px rgba(79, 255, 79, 0.7);
            --base-spacing: clamp(12px, 3vw, 24px);
            --terminal-width: min(95%, 800px);
            
            --terminal-font-size: clamp(14px, 3.5vw, 18px);
            --terminal-line-height: 1.4;
            --font-weight: 500;
        }

        body {
            background-color: var(--terminal-bg);
            color: var(--terminal-text);
            font-family: 'Ubuntu Mono', 'Courier New', monospace;
            font-size: var(--terminal-font-size);
            font-weight: var(--font-weight);
            line-height: var(--terminal-line-height);
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: var(--text-glow);
            overflow: hidden;
            letter-spacing: 0.02em;
        }

        .terminal {
            width: var(--terminal-width);
            height: min(90vh, 600px);
            height: min(90dvh, 600px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: var(--base-spacing);
            background-color: var(--terminal-bg);
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: var(--terminal-text) var(--terminal-bg);
            -webkit-overflow-scrolling: touch;
        }

        .terminal::-webkit-scrollbar {
            width: 3px;
        }

        .terminal::-webkit-scrollbar-track {
            background: var(--terminal-bg);
        }

        .terminal::-webkit-scrollbar-thumb {
            background: var(--terminal-text);
            opacity: 0.7;
        }

        .terminal__line {
            display: flex;
            align-items: flex-start;
            margin-bottom: 0.7em;
            width: 100%;
            padding: 0.2em 0;
        }

        .terminal__prompt {
            color: var(--terminal-text);
            margin-right: 0.8em;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .terminal__typed-text,
        .terminal__command-output,
        .terminal__services-output,
        .terminal__contacts-output {
            color: var(--terminal-text);
            font-family: inherit;
            font-size: inherit;
            font-weight: inherit;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .terminal__cursor {
            display: inline-block;
            width: 0.6em;
            height: 1.1em;
            background-color: var(--terminal-text);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 1px;
            box-shadow: var(--text-glow);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .u-hidden {
            display: none !important;
        }

        ::-webkit-scrollbar {
            width: 3px;
        }

        ::-webkit-scrollbar-track {
            background: var(--terminal-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--terminal-text);
            opacity: 0.7;
        }

        ::selection {
            background: var(--terminal-text);
            color: var(--terminal-bg);
            text-shadow: none;
        }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="terminal__line">
            <span class="terminal__prompt">ai@mitkox:~$</span>
            <div class="terminal__typed-text terminal__first-line"></div>
            <span class="terminal__cursor terminal__first-cursor"></span>
        </div>
        <div class="terminal__line u-hidden">
            <div class="terminal__command-output">Welcome to mitko x labs</div>
        </div>
        <div class="terminal__line u-hidden">
            <span class="terminal__prompt">ai@mitkox:~$</span>
            <div class="terminal__typed-text terminal__services-command"></div>
            <span class="terminal__cursor terminal__services-cursor u-hidden"></span>
        </div>
        <div class="terminal__line u-hidden">
            <div class="terminal__command-output terminal__services-output"></div>
        </div>
        <div class="terminal__line u-hidden">
            <span class="terminal__prompt">ai@mitkox:~$</span>
            <div class="terminal__typed-text terminal__contact-line"></div>
            <span class="terminal__cursor terminal__contact-cursor u-hidden"></span>
        </div>
        <div class="terminal__line u-hidden">
            <div class="terminal__command-output terminal__contacts-output"></div>
        </div>
    </div>
    <script>
        const firstLine = "./hello-world";
        const servicesCommand = "./services";
        const services = [
            "Enterprise and Industrial Solutions",
            "Emerging Technology Solutions Engineering",
            "AI Solutions Integration",
            "On Premises and Offline AI",
            "On device AI and Edge AI",
            "Custom AI Models and AI Agents Development",
            "Industrial IoT and Connectivity Solutions",
            "Strategy and Technology Consulting"
        ];
        const contactLine = "./contacts";
        const contacts = "Contact us at sales@mitkox.com";
        
        const elements = {
            firstLine: document.querySelector('.terminal__first-line'),
            servicesCommand: document.querySelector('.terminal__services-command'),
            servicesOutput: document.querySelector('.terminal__services-output'),
            contactLine: document.querySelector('.terminal__contact-line'),
            contactsOutput: document.querySelector('.terminal__contacts-output'),
            cursors: {
                first: document.querySelector('.terminal__first-cursor'),
                services: document.querySelector('.terminal__services-cursor'),
                contact: document.querySelector('.terminal__contact-cursor')
            },
            containers: {
                helloWorld: document.querySelector('.terminal__line:nth-child(2)'),
                servicesCommand: document.querySelector('.terminal__line:nth-child(3)'),
                servicesOutput: document.querySelector('.terminal__line:nth-child(4)'),
                contactLine: document.querySelector('.terminal__line:nth-child(5)'),
                contactsOutput: document.querySelector('.terminal__line:nth-child(6)')
            }
        };

        const state = {
            currentCharFirst: 0,
            currentCharServices: 0,
            currentCharContact: 0,
            typingSpeed: 100,
            waitTime: 500
        };

        const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));
        const showElement = (element) => element.classList.remove('u-hidden');
        const hideElement = (element) => element.classList.add('u-hidden');

        async function typeText(element, text, stateKey) {
            while (state[stateKey] < text.length) {
                element.textContent += text.charAt(state[stateKey]);
                state[stateKey]++;
                await wait(state.typingSpeed);
            }
        }

        async function startTerminal() {
            try {
                await wait(state.waitTime);
                await typeText(elements.firstLine, firstLine, 'currentCharFirst');
                
                hideElement(elements.cursors.first);
                showElement(elements.containers.helloWorld);
                
                await wait(state.waitTime);
                showElement(elements.containers.servicesCommand);
                showElement(elements.cursors.services);
                
                await typeText(elements.servicesCommand, servicesCommand, 'currentCharServices');
                
                await wait(state.waitTime);
                hideElement(elements.cursors.services);
                showElement(elements.containers.servicesOutput);
                elements.servicesOutput.textContent = services.join('\n');
                
                await wait(state.waitTime);
                showElement(elements.containers.contactLine);
                showElement(elements.cursors.contact);
                
                await typeText(elements.contactLine, contactLine, 'currentCharContact');
                
                await wait(state.waitTime);
                hideElement(elements.cursors.contact);
                showElement(elements.containers.contactsOutput);
                elements.contactsOutput.textContent = contacts;
            } catch (error) {
                console.error('Terminal animation error:', error);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', startTerminal);
        } else {
            startTerminal();
        }
    </script>
</body>
</html>
