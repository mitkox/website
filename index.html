<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mitko x Emerging Technologies Labs</title>
    <style>
        body {
            background-color: black;
            color: #00ff00;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .terminal {
            width: 800px;
            height: 300px;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .line {
            display: flex;
            align-items: center;
            white-space: nowrap;
            margin-bottom: 10px;
            height: 24px;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background-color: #00ff00;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .typed-text {
            font-size: 1.2em;
            display: inline;
        }

        .prompt {
            color: #00ff00;
            margin-right: 8px;
            font-size: 1.2em;
        }

        .hidden {
            display: none;
        }

        .user-host {
            color: #00ff00;
        }

        .password-prompt {
            margin-left: 0;
        }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="line">
            <span class="prompt"><span class="user-host">mitko@on-device-ai.local</span>:~ $</span>
            <div class="typed-text first-line"></div>
            <span class="cursor first-cursor"></span>
        </div>
        <div class="line hidden">
            <span class="prompt password-prompt">Password: </span>
            <div class="typed-text password-line"></div>
            <span class="cursor password-cursor hidden"></span>
        </div>
        <div class="line hidden">
            <span class="prompt"><span class="user-host">root@on-device-ai.local</span>:~ #</span>
            <div class="typed-text root-line"></div>
            <span class="cursor root-cursor hidden"></span>
        </div>
        <div class="line hidden">
            <span class="prompt"><span class="user-host">root@on-device-ai.local</span>:~ #</span>
            <div class="typed-text contact-line"></div>
            <span class="cursor contact-cursor hidden"></span>
        </div>
    </div>

    <script>
        const firstLine = "su";
        const passwordLine = "";
        const rootLine = "Welcome to mitko x Emerging Technologies Labs";
        // Email is encoded to prevent scraping
        const contactLine = "Contact us at &#104;&#105;&#64;&#109;&#105;&#116;&#107;&#111;&#120;&#46;&#99;&#111;&#109;";
        
        const firstLineElement = document.querySelector('.first-line');
        const passwordLineElement = document.querySelector('.password-line');
        const rootLineElement = document.querySelector('.root-line');
        const contactLineElement = document.querySelector('.contact-line');
        
        const firstCursor = document.querySelector('.first-cursor');
        const passwordCursor = document.querySelector('.password-cursor');
        const rootCursor = document.querySelector('.root-cursor');
        const contactCursor = document.querySelector('.contact-cursor');
        
        const passwordLineContainer = document.querySelector('.line:nth-child(2)');
        const rootLineContainer = document.querySelector('.line:nth-child(3)');
        const contactLineContainer = document.querySelector('.line:nth-child(4)');
        
        let currentCharFirst = 0;
        let currentCharRoot = 0;
        let currentCharContact = 0;
        const typingSpeed = 100;

        function startTerminal() {
            setTimeout(typeFirstLine, 1500);
        }

        function typeFirstLine() {
            if (currentCharFirst < firstLine.length) {
                firstLineElement.textContent += firstLine.charAt(currentCharFirst);
                currentCharFirst++;
                setTimeout(typeFirstLine, typingSpeed);
            } else {
                setTimeout(showPasswordPrompt, 500);
            }
        }

        function showPasswordPrompt() {
            firstCursor.classList.add('hidden');
            passwordLineContainer.classList.remove('hidden');
            passwordCursor.classList.remove('hidden');
            
            setTimeout(() => {
                simulatePasswordEntry();
            }, 1500);
        }

        function simulatePasswordEntry() {
            setTimeout(() => {
                passwordCursor.classList.add('hidden');
                showRootPrompt();
            }, 1000);
        }

        function showRootPrompt() {
            rootLineContainer.classList.remove('hidden');
            rootCursor.classList.remove('hidden');
            setTimeout(typeRootLine, 500);
        }

        function typeRootLine() {
            if (currentCharRoot < rootLine.length) {
                rootLineElement.textContent += rootLine.charAt(currentCharRoot);
                currentCharRoot++;
                setTimeout(typeRootLine, typingSpeed);
            } else {
                setTimeout(showContactLine, 1000);
            }
        }

        function showContactLine() {
            rootCursor.classList.add('hidden');
            contactLineContainer.classList.remove('hidden');
            contactCursor.classList.remove('hidden');
            // Create a temporary div to decode the HTML entities
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = contactLine;
            const decodedText = tempDiv.textContent;
            typeContactLine(decodedText);
        }

        function typeContactLine(decodedText) {
            if (currentCharContact < decodedText.length) {
                contactLineElement.textContent += decodedText.charAt(currentCharContact);
                currentCharContact++;
                setTimeout(() => typeContactLine(decodedText), typingSpeed);
            }
        }

        window.onload = startTerminal;
    </script>
</body>
</html>
